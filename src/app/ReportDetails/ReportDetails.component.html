<div class="page-wrapper">

  <div class="navbar">
    <div class="navbar-left">
      <h1 class="nav-title">Report Details</h1>
    </div>
  </div>

  <div class="main-content">

    <p class="back-btn" (click)="goBack()">← Back to Dashboard</p>

    <div class="report-card" *ngIf="report">

      <div class="report-header">
        <h2 class="report-title">{{ report.title }}</h2>
        <span class="report-status">{{ report.status }}</span>
      </div>

      <hr class="divider" />

      <div class="report-meta">
        <div class="meta-item">
          <span class="meta-label">Submitted</span>
          <span class="meta-value">{{ report.date }}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Category</span>
          <span class="meta-value">{{ report.category }}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Type of Report</span>
          <span class="meta-value">{{ report.reportType }}</span>
        </div>
      </div>
      <!-- wala pay database so comment sa ni
      <div class="meta-item">
          <span class="meta-label">Submitted by</span>
          <span class="meta-value">{{ report.submittedBy  }}</span>
        </div>
      </div> 
      -->

      <hr class="divider" />

      <!-- Description -->
      <div class="report-section">
        <h3 class="section-label">Description</h3>
        <p class="report-description">{{ report.description }}</p>
      </div>

      <!-- Attachment -->
      <div class="report-section" *ngIf="report.attachment && report.attachment !== 'No attachment'">
        <h3 class="section-label">Attachment</h3>
        <p class="attachment-name">📎 {{ report.attachment }}</p>
      </div>

    </div>

    <div class="empty-state" *ngIf="!report">
      <p>No report found.</p>
      <button class="btn-back" (click)="goBack()">Back to Dashboard</button>
    </div>

  </div>
</div>
